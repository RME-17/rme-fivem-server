# ____  ____   _____
# QBCore / RETRON server.cfg
#
# FiveM docs:  https://aka.cfx.re/server-commands
# QBCore docs: https://docs.qbcore.org
#
# ------------------------------------------------------------------
# LOAD ORDER RULES  (why gym / mining used to "disappear" & need a
# manual re-ensure after every boot or edit):
#   1. Pure libraries (oxmysql, ox_lib, ox_target, PolyZone, koja-lib,
#      object_gizmo, xsound...) load FIRST - qb-core and the [qb] pack
#      depend on them.
#   2. qb-core next.
#   3. `ensure [qb]` starts the WHOLE [qb] folder. Everything that lives
#      in [qb] starts here automatically: qb-target, qb-inventory,
#      qb-menu, ps-dispatch, ps-mdt, qb-ambulancejob AND every rme-*
#      that lives in [qb] (rme-gym, rme-playerstats, rme-safezone-ui,
#      rme-infohud, rme-speedo, rme-nohudcash, rme-emsboss).
#      >>> Do NOT ensure any of those BEFORE this line, or they fail
#          their dependency check and never start. <<<
#   4. `ensure [standalone]` starts the whole [standalone] folder AFTER
#      [qb], so standalone jobs that need qb-core/qb-target/qb-inventory
#      (jim_bridge + jim-mining-main, carmarket, nex_crafting...) work.
#   5. Order-sensitive standalone chains are re-ensured at the end in the
#      correct order. Re-ensuring is harmless (restarts if already up) and
#      guarantees everything is running every boot with no manual ensures.
# ------------------------------------------------------------------

## --- Connectivity ---
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"
sv_maxclients 48
set steam_webApiKey "none"
sets tags "default, deployer, qbcore, qb-core"

## --- Identity / secrets ---
## WARNING: the license key, DB string and screenshot webhook were exposed
## publicly. ROTATE them and paste the NEW values here. Never commit real
## secrets - this file is the sanitised template (live server.cfg is gitignored).
sv_licenseKey "PASTE_YOUR_NEW_CFX_LICENSE_KEY_HERE"   # https://keymaster.fivem.net
sv_hostname "RETRON built with QBCore Framework by JericoFx & Kakarot & Hamy!"
sets sv_projectName "[QBCore Framework] RETRON"
sets sv_projectDesc "An advanced FiveM RP framework including jobs, gangs, housing & more!"
sets locale "root-AQ"
load_server_icon myLogo.png
sv_enforceGameBuild 3095 #DLC The Chop Shop
set resources_useSystemChat true
set mysql_connection_string "mysql://root@localhost/QBCore_3ACA50?charset=utf8mb4"

# Screenshot webhook (rotate - was exposed). Set BEFORE screenshot-basic starts.
set SCREENSHOT_BASIC_TOKEN "PASTE_YOUR_NEW_ROTATED_WEBHOOK_URL_HERE"

# Voice config
setr voice_useNativeAudio true
setr voice_defaultCycle "GRAVE"
setr voice_defaultVolume 0.3
setr voice_enableRadioAnim 1
setr voice_syncData 1
setr voice_useSendingRangeOnly false

# QBCore config
setr qb_locale "en"
setr UseTarget true

# ============================================================
# 1) Base Cfx resources
# ============================================================
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure basic-gamemode
ensure hardcap
ensure baseevents

# ============================================================
# 2) Database + shared libraries (MUST load before qb-core / [qb])
#    All standalone with no qb dependency - safe to load first.
# ============================================================
ensure oxmysql
ensure ox_lib
ensure ox_target
ensure PolyZone
ensure koja-lib
ensure object_gizmo
ensure xsound
ensure safezones
ensure rme-items

# ============================================================
# 3) Core
# ============================================================
ensure qb-core

# ============================================================
# 4) The entire QB pack (starts qb-target, qb-inventory, qb-menu,
#    ps-dispatch, ps-mdt, qb-ambulancejob AND all rme-* in [qb]:
#    rme-gym, rme-playerstats, rme-safezone-ui, rme-infohud,
#    rme-speedo, rme-nohudcash, rme-emsboss).
#    Do NOT ensure any of those above this line.
# ============================================================
ensure [qb]

# Disable legacy qb-doorlock - replaced by ox_doorlock (in [standalone]).
# ox_doorlock provides the /doorlock UI and job-based locking; running both
# would conflict over the door interaction. Reversible: remove this line.
stop qb-doorlock

# ============================================================
# 5) Standalone / voice / map categories (AFTER [qb])
# ============================================================
ensure [standalone]
ensure [voice]
ensure [defaultmaps]

# ============================================================
# 6) Order-sensitive + [qb]-dependent resources, re-ensured in the
#    correct order so they ALWAYS come up (no manual ensures needed).
# ============================================================
# Chat cleaner (local-only; remove if console says 'couldn't find resource')
ensure rme-chat-clean

# Audio / media chain: xsound (loaded above) -> rme-tv -> rde_oxmedia
ensure rme-tv
ensure rde_oxmedia
add_ace group.admin rde_oxmedia.admin allow

# Map editor (needs ox_lib + object_gizmo + qb-core)
ensure rme-mapper

# Prop placer chain (kq_link MUST load before kq_propplacer)
ensure kq_link
ensure kq_propplacer
ensure tstudio_sit

# Fuel system (qb-fuel disabled at filesystem level; lc_utils before lc_fuel)
ensure lc_utils
ensure lc_fuel

# Jobs / shops that need qb-core, qb-target, qb-inventory
# jim_bridge (framework bridge) MUST load before jim-mining-main
ensure jim_bridge
ensure jim-mining-main
ensure nex_crafting
ensure rcd_trucking
ensure carmarket

# RME custom standalone
ensure rme-pd-garage
ensure rme-evp-menu
ensure rme-pdm-display
ensure fetchq-oil-map
ensure fetchq-oil

# Emotes
ensure rpemotes

# MLOs / maps
ensure zero_vinewood
ensure energy_redlinemlo
ensure rme-redlineblip
ensure cc_lmsc_01
ensure rme-gymblip
ensure marinestable
ensure rme-nopeds-mlo
ensure oulsen_satmap

# ONX emergency vehicles (shared base MUST load before the vehicle)
ensure onx-evp-a-shared
ensure onx-evp-d-polscout

# ============================================================
# 7) Phone (npwd) - core before bridge + apps (top-level resources)
# ============================================================
ensure npwd
ensure qb-npwd
ensure npwd_bankingapp

## ============================================================
## Permissions
## ============================================================
add_ace group.admin command allow
add_principal identifier.fivem:16878285 group.admin #YazGordon
add_principal identifier.license:5f81ca37be5397fbd7752fc75f4c37cbcab41ae0 qbcore.god

add_ace resource.qb-core command allow
add_ace group.admin rmegym.admin allow

add_ace qbcore.god command allow
add_principal qbcore.god group.admin
add_principal qbcore.god qbcore.admin
add_principal qbcore.admin qbcore.mod
