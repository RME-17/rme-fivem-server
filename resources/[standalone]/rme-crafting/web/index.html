<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ===== CREATOR ===== -->
<div id="creator" class="panel hidden">
  <div class="sidebar">
    <div class="brand"><span class="dot"></span> RME Crafting</div>
    <button id="newBenchBtn" class="btn btn-accent full">+ New Bench</button>
    <div class="side-label">Saved Benches</div>
    <div id="benchList" class="bench-list"></div>
    <button id="closeCreator" class="btn btn-ghost full">Close</button>
  </div>
  <div class="content">
    <div id="editorEmpty" class="editor-empty">Select a bench on the left, or create a new one.</div>
    <div id="editor" class="editor hidden">
      <div class="tabs">
        <div class="tab active" data-tab="basic">Basic</div>
        <div class="tab" data-tab="access">Access</div>
        <div class="tab" data-tab="recipes">Recipes</div>
        <div class="tab" data-tab="settings">Settings</div>
      </div>
      <div class="tab-body">
        <div class="tab-pane active" data-pane="basic"></div>
        <div class="tab-pane" data-pane="access"></div>
        <div class="tab-pane" data-pane="recipes"></div>
        <div class="tab-pane" data-pane="settings"></div>
      </div>
      <div class="editor-footer">
        <button id="saveBench" class="btn btn-accent">Save Changes</button>
        <button id="placeBench" class="btn btn-primary hidden">Place Bench</button>
        <button id="moveBench" class="btn btn-primary hidden">Move</button>
        <button id="dupBench" class="btn btn-ghost hidden">Duplicate</button>
        <button id="deleteBench" class="btn btn-danger hidden">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== ITEM PICKER ===== -->
<div id="itemPicker" class="modal hidden">
  <div class="modal-box">
    <div class="modal-head">
      <span>Select Item</span>
      <input id="pickerSearch" placeholder="Search items..." />
      <button id="pickerClose" class="btn btn-ghost">Close</button>
    </div>
    <div id="pickerCats" class="picker-cats"></div>
    <div id="pickerGrid" class="picker-grid"></div>
  </div>
</div>

<!-- ===== CRAFT ===== -->
<div id="craft" class="panel-craft hidden">
  <div class="craft-header">
    <span id="craftTitle">Workbench</span>
    <div class="craft-tools">
      <span id="craftLevel" class="level-badge"></span>
      <input id="craftSearch" class="craft-search" placeholder="Search..." />
      <div class="qty-stepper"><button id="qtyMinus">-</button><span id="qtyVal">1</span><button id="qtyPlus">+</button></div>
      <button id="closeCraft" class="btn btn-ghost">Close</button>
    </div>
  </div>
  <div id="craftCats" class="craft-cats"></div>
  <div id="craftGrid" class="craft-grid"></div>
</div>

<script src="script.js"></script>
</body>
</html>
