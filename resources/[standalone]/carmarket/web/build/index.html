<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koja Scripts Boilerplate</title>
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.7.2/css/all.css">
    <!-- RME_HIDE_MYCARS_TAB: removes the "My cars" sidebar tab at runtime. -->
    <script>
      (function () {
        var TARGETS = ['my cars', 'mycars'];
        function norm(s) { return (s || '').replace(/\s+/g, ' ').trim().toLowerCase(); }
        function isTarget(t) { return TARGETS.indexOf(t) !== -1; }
        function hideMyCars() {
          var all = document.querySelectorAll('*');
          for (var i = 0; i < all.length; i++) {
            var el = all[i];
            if (!el || (el.dataset && el.dataset.rmeSeen === '1')) continue;
            if (!isTarget(norm(el.textContent))) continue;
            // Climb to the outermost ancestor that still contains ONLY this label,
            // i.e. the full clickable nav row. Stop before the nav container that
            // also holds the other tabs.
            var target = el;
            while (target.parentElement && isTarget(norm(target.parentElement.textContent))) {
              target = target.parentElement;
            }
            target.style.setProperty('display', 'none', 'important');
            if (target.dataset) target.dataset.rmeSeen = '1';
            if (el.dataset) el.dataset.rmeSeen = '1';
          }
        }
        function start() {
          hideMyCars();
          try {
            var obs = new MutationObserver(function () { hideMyCars(); });
            obs.observe(document.documentElement, { childList: true, subtree: true });
          } catch (e) {}
          // Safety re-runs in case the menu mounts after first paint.
          var n = 0, iv = setInterval(function () { hideMyCars(); if (++n > 40) clearInterval(iv); }, 250);
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', start);
        } else {
          start();
        }
      })();
    </script>
