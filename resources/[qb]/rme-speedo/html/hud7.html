<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Roboto,Arial,sans-serif; }
  html,body { width:100%; height:100%; overflow:hidden; background:transparent; }

  :root{
    --mm-left: 1vw;
    --mm-bottom: 4.5vh;
    --mm-width: 31vh;
    --mm-height: 20vh;
    --accent: #5ad1ff;
    --good: #54e0a0;
    --warn: #ffcc57;
    --bad:  #ff5d6c;
  }
  #mmfade {
    position:absolute; left:var(--mm-left); bottom:var(--mm-bottom);
    width:var(--mm-width); height:var(--mm-height);
    pointer-events:none; border-radius:14px; display:none;
  }

  /* ===================== Compass (above minimap) ===================== */
  #rmecompass {
    position:absolute; left:var(--mm-left); bottom:21vh; width:var(--mm-width);
    display:none; text-align:center; color:#fff;
  }
  #rmecompass.visible { display:block; }
  .rc-pill {
    display:inline-flex; align-items:baseline; gap:6px; padding:3px 12px;
    border-radius:999px; background:rgba(12,14,18,0.72);
    border:1px solid rgba(255,255,255,0.10);
    box-shadow:0 6px 18px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  #rmecompass .rc-dir { font-size:18px; font-weight:800; letter-spacing:1px; color:#fff;
    text-shadow:0 0 12px rgba(90,209,255,0.35); }
  #rmecompass .rc-deg { font-size:12px; font-weight:700; color:rgba(255,255,255,0.6); }
  #rmecompass .rc-street { font-size:11px; font-weight:600; color:rgba(255,255,255,0.82);
    margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    text-shadow:0 1px 3px rgba(0,0,0,0.9); }
  body.paused #mmfade,
  body.paused #rmecompass { display:none !important; }

  /* ===================== Speedometer (bottom-right) ===================== */
  #speedo {
    position:absolute; right:22px; bottom:20px;
    opacity:0; transform:translateY(12px) scale(.96);
    transition:opacity .3s ease, transform .3s ease;
    pointer-events:none; -webkit-font-smoothing:antialiased;
  }
  #speedo.visible { opacity:1; transform:none; }
  /* Soft depth halo behind the cluster (radial fade -> transparent, NOT a box) */
  #speedo::before {
    content:''; position:absolute; left:50%; top:46%;
    transform:translate(-50%,-50%);
    width:120%; height:150%; z-index:-1; pointer-events:none;
    background:radial-gradient(closest-side, rgba(6,10,18,0.60), rgba(6,10,18,0.28) 55%, rgba(6,10,18,0) 78%);
  }

  .panel { width:248px; padding:4px 2px 4px; background:transparent; }

  .cluster { display:flex; align-items:center; justify-content:center; }

  .gauge { position:relative; width:210px; height:210px; flex:0 0 auto; }
  .dial { width:210px; height:210px; display:block; overflow:visible;
    filter:drop-shadow(0 3px 7px rgba(0,0,0,0.6)); }

  .rpmtrack { fill:none; stroke:rgba(255,255,255,0.05); stroke-width:3.5; stroke-linecap:round; }
  .rpmfill  { fill:none; stroke:url(#rpmGrad); stroke-width:3.5; stroke-linecap:round;
    transition:stroke-dasharray .12s linear, stroke .2s; }
  .track { fill:none; stroke:rgba(255,255,255,0.09); stroke-width:11; stroke-linecap:round; }
  .glowtrack { fill:none; stroke:rgba(90,209,255,0.05); stroke-width:18; stroke-linecap:round; }
  .prog  { fill:none; stroke:url(#spdGrad); stroke-width:11; stroke-linecap:round;
    transition:stroke-dasharray .14s linear, stroke .25s; }
  .tick       { stroke:rgba(255,255,255,0.18); stroke-width:1.5; }
  .tick-major { stroke:rgba(255,255,255,0.5); stroke-width:2.2; }

  /* Curved side health/damage bars built into the dial */
  .sidetrack { fill:none; stroke:rgba(255,255,255,0.08); stroke-width:7; stroke-linecap:round; }
  .sidefill  { fill:none; stroke:url(#ringGrad); stroke-width:7; stroke-linecap:round;
    filter:drop-shadow(0 0 5px rgba(84,224,160,0.5));
    transition:stroke-dasharray .35s ease, stroke .3s, filter .3s; }

  .center { position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; }
  .val {
    font-size:64px; font-weight:900; line-height:1; letter-spacing:-2px;
    background:linear-gradient(180deg,#ffffff 0%,#d6f3ff 55%,#9fe6ff 100%);
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; color:transparent;
    font-variant-numeric:tabular-nums; font-feature-settings:'tnum' 1;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,0.75)) drop-shadow(0 0 16px rgba(90,209,255,0.4));
  }
  .unit { margin-top:6px; font-size:9px; font-weight:800; letter-spacing:3.5px;
    color:rgba(255,255,255,0.6); text-shadow:0 1px 3px rgba(0,0,0,0.85); }

  .gear {
    display:flex; align-items:center; justify-content:center; min-width:32px;
    margin-top:10px; padding:3px 13px; border-radius:10px;
    background:linear-gradient(180deg, rgba(90,209,255,0.16), rgba(90,209,255,0.06));
    border:1px solid rgba(90,209,255,0.5);
    color:#9fe6ff; font-size:13px; font-weight:800; letter-spacing:.5px;
    box-shadow:0 0 16px rgba(90,209,255,0.22), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .airRow { display:none; align-items:baseline; gap:4px; margin-top:10px; }
  .albl { font-size:9px; color:rgba(255,255,255,0.55); font-weight:800; letter-spacing:2px; }
  .aval { font-weight:800; color:#9fe6ff; font-size:16px; font-variant-numeric:tabular-nums; }
  .aunit { color:rgba(255,255,255,0.55); font-size:10px; font-weight:700; }

  /* Icons that label each side bar (sit on the middle of the side arc) */
  .sideIcon { position:absolute; top:50%; transform:translateY(-50%);
    width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle, rgba(8,12,20,0.78), rgba(8,12,20,0) 72%); }
  .sideIcon.left  { left:-15px; }
  .sideIcon.right { right:-15px; }
  .sideIcon svg { width:18px; height:18px; color:rgba(255,255,255,0.95);
    filter:drop-shadow(0 1px 2px rgba(0,0,0,0.85)); transition:color .3s; }

  /* Fuel (gas) segmented slider, bottom */
  .gas { display:flex; align-items:center; gap:8px; width:184px; margin:-4px auto 0; }
  .gas .mi { width:12px; height:12px; flex:0 0 auto; color:rgba(255,255,255,0.92);
    filter:drop-shadow(0 1px 2px rgba(0,0,0,0.8)); transition:color .3s; }
  .bar { position:relative; flex:1; height:7px; border-radius:7px;
    background:rgba(0,0,0,0.5); box-shadow:inset 0 0 0 1px rgba(255,255,255,0.10), inset 0 1px 2px rgba(0,0,0,0.6);
    overflow:hidden; }
  .bar > span { position:absolute; left:0; top:0; bottom:0; width:50%; border-radius:7px;
    background:linear-gradient(90deg,#54e0a0,#6fe6c4);
    box-shadow:0 0 10px rgba(84,224,160,0.55);
    transition:width .35s ease, background .3s, box-shadow .3s; }
  .bar::after { content:''; position:absolute; inset:0; border-radius:7px; pointer-events:none;
    background:repeating-linear-gradient(90deg, rgba(0,0,0,0) 0 10px, rgba(0,0,0,0.4) 10px 12px); }
</style>
</head>
<body>
  <div id="mmfade"></div>
  <div id="rmecompass">
    <div class="rc-pill"><span class="rc-dir" id="rcdir">N</span><span class="rc-deg" id="rcdeg">0°</span></div>
    <div class="rc-street" id="rcstreet"></div>
  </div>

  <div id="speedo">
    <div class="panel">
      <div class="cluster">
        <div class="gauge">
          <svg class="dial" viewBox="0 0 200 200">
            <defs>
              <linearGradient id="spdGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#5ad1ff"/>
                <stop offset="50%" stop-color="#62e6c8"/>
                <stop offset="100%" stop-color="#7cf2a8"/>
              </linearGradient>
              <linearGradient id="rpmGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="rgba(120,225,255,0.5)"/>
                <stop offset="100%" stop-color="rgba(124,242,168,0.7)"/>
              </linearGradient>
              <linearGradient id="ringGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                <stop offset="0%" stop-color="#5ad1ff"/>
                <stop offset="100%" stop-color="#54e0a0"/>
              </linearGradient>
              <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="2.6" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            <!-- Curved HEALTH bar hugging the LEFT side (engine) -->
            <circle class="sidetrack" cx="100" cy="100" r="97" transform="rotate(100 100 100)" stroke-dasharray="270.9 609.47"></circle>
            <circle class="sidefill" id="engArc" cx="100" cy="100" r="97" transform="rotate(100 100 100)" stroke-dasharray="0 609.47"></circle>

            <!-- Curved DAMAGE bar hugging the RIGHT side (body), mirrored -->
            <g transform="translate(200,0) scale(-1,1)">
              <circle class="sidetrack" cx="100" cy="100" r="97" transform="rotate(100 100 100)" stroke-dasharray="270.9 609.47"></circle>
              <circle class="sidefill" id="bodyArc" cx="100" cy="100" r="97" transform="rotate(100 100 100)" stroke-dasharray="0 609.47"></circle>
            </g>

            <!-- Outer RPM ring -->
            <circle class="rpmtrack" cx="100" cy="100" r="90" transform="rotate(135 100 100)" stroke-dasharray="424.12 565.49"></circle>
            <circle class="rpmfill" id="rpm" cx="100" cy="100" r="90" transform="rotate(135 100 100)" stroke-dasharray="0 565.49"></circle>

            <!-- Main speed dial -->
            <circle class="glowtrack" cx="100" cy="100" r="80" transform="rotate(135 100 100)" stroke-dasharray="376.99 502.65"></circle>
            <circle class="track" cx="100" cy="100" r="80" transform="rotate(135 100 100)" stroke-dasharray="376.99 502.65"></circle>
            <g id="ticks"></g>
            <circle class="prog" id="prog" cx="100" cy="100" r="80" transform="rotate(135 100 100)" stroke-dasharray="0 502.65" filter="url(#glow)"></circle>
          </svg>

          <div class="sideIcon left">
            <svg id="engIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
          </div>
          <div class="sideIcon right">
            <svg id="bodyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 1 12v4c0 .6.4 1 1 1h2"></path><circle cx="7" cy="17" r="2"></circle><circle cx="17" cy="17" r="2"></circle></svg>
          </div>

          <div class="center">
            <div class="val" id="spd">0</div>
            <div class="unit" id="unit">KM/H</div>
            <div class="gear" id="gear">N</div>
            <div class="airRow" id="airRow">
              <span class="albl">ALT</span><span class="aval" id="alt">0</span><span class="aunit">m</span>
            </div>
          </div>
        </div>
      </div>

      <div class="gas">
        <svg class="mi" id="fuelIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="15" y1="22" y2="22"></line><line x1="4" x2="14" y1="9" y2="9"></line><path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"></path><path d="M14 13h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2a2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"></path></svg>
        <div class="bar"><span id="fuelBar"></span></div>
      </div>
    </div>
  </div>

<script>
(function(){
  var SPEED_C = 502.65, SPEED_ARC = 376.99;   // main dial (270deg, r=80)
  var RPM_C = 565.49, RPM_ARC = 424.12;        // rpm ring (270deg, r=90)
  var SIDE_C = 609.47, SIDE_ARC = 270.9;       // side bars (160deg, r=97)
  function el(id){ return document.getElementById(id); }
  function clamp(lo, hi, v){ return Math.max(lo, Math.min(hi, v)); }

  function setArc(id, iconId, pct){
    var frac = clamp(0, 1, pct / 100);
    var r = el(id);
    r.setAttribute('stroke-dasharray', (frac * SIDE_ARC).toFixed(1) + ' ' + SIDE_C);
    if (pct > 60) {
      r.style.stroke = 'url(#ringGrad)';
      r.style.filter = 'drop-shadow(0 0 5px rgba(84,224,160,0.5))';
    } else if (pct > 30) {
      r.style.stroke = '#ffcc57';
      r.style.filter = 'drop-shadow(0 0 5px rgba(255,204,87,0.55))';
    } else {
      r.style.stroke = '#ff5d6c';
      r.style.filter = 'drop-shadow(0 0 6px rgba(255,93,108,0.65))';
    }
    el(iconId).style.color = (pct <= 30) ? '#ff7a86' : 'rgba(255,255,255,0.95)';
  }

  // Build refined tick marks along the 270deg speed arc
  (function(){
    var g = el('ticks'); if(!g) return;
    var cx = 100, cy = 100, N = 30, svgns = 'http://www.w3.org/2000/svg';
    for (var i = 0; i <= N; i++) {
      var major = (i % 5 === 0);
      var rad = (135 + (i / N) * 270) * Math.PI / 180;
      var r2 = 75, r1 = major ? 65 : 70;
      var ln = document.createElementNS(svgns, 'line');
      ln.setAttribute('x1', (cx + r1 * Math.cos(rad)).toFixed(2));
      ln.setAttribute('y1', (cy + r1 * Math.sin(rad)).toFixed(2));
      ln.setAttribute('x2', (cx + r2 * Math.cos(rad)).toFixed(2));
      ln.setAttribute('y2', (cy + r2 * Math.sin(rad)).toFixed(2));
      ln.setAttribute('class', major ? 'tick tick-major' : 'tick');
      g.appendChild(ln);
    }
  })();

  function showSpeedo(s){ el('speedo').classList[s ? 'add' : 'remove']('visible'); }

  window.addEventListener('message', function(e){
    var d = e.data || {};
    if (d.action === 'pause') {
      document.body.classList[d.hidden ? 'add' : 'remove']('paused');
      return;
    }
    if (d.action === 'compass') {
      el('rmecompass').classList.add('visible');
      if (d.dir !== undefined) { el('rcdir').textContent = d.dir; }
      if (d.heading !== undefined) { el('rcdeg').textContent = d.heading + '\u00b0'; }
      if (d.street !== undefined) { el('rcstreet').textContent = d.street || ''; }
      return;
    }
    if (d.action === 'speedo') { showSpeedo(d.show); return; }
    if (d.action === 'update') {
      showSpeedo(true);
      el('spd').textContent = d.speed;
      el('unit').textContent = d.unit;

      // Speed arc (calibrated 240 ground / 260 air so the fill tracks real speed)
      var max = d.isAir ? 260 : 240;
      var frac = clamp(0, 1, (d.speed || 0) / max);
      el('prog').setAttribute('stroke-dasharray', (frac * SPEED_ARC).toFixed(1) + ' ' + SPEED_C);
      var pc = el('prog');
      if (frac >= 0.86) { pc.style.stroke = '#ff5d6c'; }
      else if (frac >= 0.62) { pc.style.stroke = '#ffcc57'; }
      else { pc.style.stroke = 'url(#spdGrad)'; }

      // Outer RPM ring (GetVehicleCurrentRpm is 0..1)
      var rpm = clamp(0, 1, d.rpm || 0);
      el('rpm').setAttribute('stroke-dasharray', (rpm * RPM_ARC).toFixed(1) + ' ' + RPM_C);
      el('rpm').style.stroke = (rpm >= 0.85) ? '#ff5d6c' : 'url(#rpmGrad)';

      // Fuel (gas) slider, bottom -- no % text
      var fuel = clamp(0, 100, d.fuel || 0);
      el('fuelBar').style.width = fuel + '%';
      if (fuel <= 20) {
        el('fuelBar').style.background = 'linear-gradient(90deg,#ff5d6c,#ff8a72)';
        el('fuelBar').style.boxShadow = '0 0 10px rgba(255,93,108,0.6)';
        el('fuelIcon').style.color = '#ff7a86';
      } else if (fuel <= 40) {
        el('fuelBar').style.background = 'linear-gradient(90deg,#ffcc57,#ffe08a)';
        el('fuelBar').style.boxShadow = '0 0 10px rgba(255,204,87,0.55)';
        el('fuelIcon').style.color = 'rgba(255,255,255,0.92)';
      } else {
        el('fuelBar').style.background = 'linear-gradient(90deg,#54e0a0,#6fe6c4)';
        el('fuelBar').style.boxShadow = '0 0 10px rgba(84,224,160,0.55)';
        el('fuelIcon').style.color = 'rgba(255,255,255,0.92)';
      }

      // Engine condition (spanner) -> LEFT side bar; Vehicle damage (body) -> RIGHT side bar
      setArc('engArc', 'engIcon', clamp(0, 100, (d.health === undefined ? 100 : d.health)));
      setArc('bodyArc', 'bodyIcon', clamp(0, 100, (d.body === undefined ? 100 : d.body)));

      // Gear (ground) vs altitude (air)
      if (d.isAir) {
        el('gear').style.display = 'none';
        el('airRow').style.display = 'flex';
        el('alt').textContent = d.altitude;
      } else {
        el('gear').style.display = 'flex';
        el('airRow').style.display = 'none';
        el('gear').textContent = (d.speed < 2) ? 'N' : ('' + d.gear);
      }
    }
  });
})();
</script>
</body>
</html>
