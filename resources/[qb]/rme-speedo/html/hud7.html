<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Roboto,Arial,sans-serif; }
  html,body { width:100%; height:100%; overflow:hidden; background:transparent; }

  :root{
    --mm-left: 1vw;
    --mm-bottom: 4.5vh;
    --mm-width: 31vh;
    --mm-height: 20vh;
    --accent: #5ad1ff;
    --good: #54e0a0;
    --warn: #ffcc57;
    --bad:  #ff5d6c;
  }
  #mmfade {
    position:absolute; left:var(--mm-left); bottom:var(--mm-bottom);
    width:var(--mm-width); height:var(--mm-height);
    pointer-events:none; border-radius:14px; display:none;
  }

  /* ===================== Compass (above minimap) ===================== */
  #rmecompass {
    position:absolute; left:var(--mm-left); bottom:21vh; width:var(--mm-width);
    display:none; text-align:center; color:#fff;
  }
  #rmecompass.visible { display:block; }
  .rc-pill {
    display:inline-flex; align-items:baseline; gap:6px; padding:3px 12px;
    border-radius:999px; background:rgba(12,14,18,0.72);
    border:1px solid rgba(255,255,255,0.10);
    box-shadow:0 6px 18px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  #rmecompass .rc-dir { font-size:18px; font-weight:800; letter-spacing:1px; color:#fff;
    text-shadow:0 0 12px rgba(90,209,255,0.35); }
  #rmecompass .rc-deg { font-size:12px; font-weight:700; color:rgba(255,255,255,0.6); }
  #rmecompass .rc-street { font-size:11px; font-weight:600; color:rgba(255,255,255,0.82);
    margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    text-shadow:0 1px 3px rgba(0,0,0,0.9); }
  body.paused #mmfade,
  body.paused #rmecompass { display:none !important; }

  /* ===================== Speedometer (bottom-right) ===================== */
  #speedo {
    position:absolute; right:22px; bottom:20px;
    opacity:0; transform:translateY(12px) scale(.96);
    transition:opacity .3s ease, transform .3s ease;
    pointer-events:none; -webkit-font-smoothing:antialiased;
  }
  #speedo.visible { opacity:1; transform:none; }

  /* Boxless: no panel background/blur (backdrop-filter renders as a black box in FiveM CEF) */
  .panel {
    width:248px; padding:4px 2px 2px; background:transparent;
  }

  .gauge { position:relative; width:210px; height:210px; margin:0 auto; }
  .dial { width:210px; height:210px; display:block; overflow:visible;
    filter:drop-shadow(0 2px 5px rgba(0,0,0,0.55)); }

  .rpmtrack { fill:none; stroke:rgba(255,255,255,0.06); stroke-width:3; stroke-linecap:round; }
  .rpmfill  { fill:none; stroke:rgba(120,225,255,0.55); stroke-width:3; stroke-linecap:round;
    transition:stroke-dasharray .12s linear, stroke .2s; }
  .track { fill:none; stroke:rgba(255,255,255,0.10); stroke-width:10; stroke-linecap:round; }
  .prog  { fill:none; stroke:url(#spdGrad); stroke-width:10; stroke-linecap:round;
    transition:stroke-dasharray .14s linear, stroke .25s; }
  .tick       { stroke:rgba(255,255,255,0.16); stroke-width:1.5; }
  .tick-major { stroke:rgba(255,255,255,0.42); stroke-width:2; }

  .center { position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; }
  .val {
    font-size:62px; font-weight:800; line-height:1; letter-spacing:-1.5px; color:#fff;
    font-variant-numeric:tabular-nums; font-feature-settings:'tnum' 1;
    text-shadow:0 0 18px rgba(90,209,255,0.35), 0 2px 7px rgba(0,0,0,0.8);
  }
  .unit { margin-top:5px; font-size:9px; font-weight:800; letter-spacing:3px;
    color:rgba(255,255,255,0.62); text-shadow:0 1px 3px rgba(0,0,0,0.85); }

  .gear {
    display:flex; align-items:center; justify-content:center; min-width:30px;
    margin-top:9px; padding:3px 12px; border-radius:9px;
    background:rgba(90,209,255,0.10); border:1px solid rgba(90,209,255,0.45);
    color:#7fdcff; font-size:13px; font-weight:800; letter-spacing:.5px;
    box-shadow:0 0 14px rgba(90,209,255,0.18);
  }
  .airRow { display:none; align-items:baseline; gap:4px; margin-top:9px; }
  .albl { font-size:9px; color:rgba(255,255,255,0.55); font-weight:800; letter-spacing:2px; }
  .aval { font-weight:800; color:#7fdcff; font-size:16px; font-variant-numeric:tabular-nums; }
  .aunit { color:rgba(255,255,255,0.55); font-size:10px; font-weight:700; }

  .meters { margin:4px auto 0; width:150px; display:flex; flex-direction:column; gap:7px; }
  .meter { display:flex; align-items:center; gap:6px; }
  .meter .mi { width:9px; height:9px; flex:0 0 auto; color:rgba(255,255,255,0.92);
    filter:drop-shadow(0 1px 2px rgba(0,0,0,0.7)); transition:color .3s; }
  .bar { position:relative; flex:1; height:4px; border-radius:6px;
    background:rgba(0,0,0,0.45); box-shadow:inset 0 0 0 1px rgba(255,255,255,0.10); overflow:hidden; }
  .bar > span { position:absolute; left:0; top:0; bottom:0; width:50%; border-radius:6px;
    background:var(--good); box-shadow:0 0 8px rgba(84,224,160,0.4);
    transition:width .35s ease, background .3s, box-shadow .3s; }
  .pct { font-size:8px; font-weight:700; color:rgba(255,255,255,0.82);
    width:24px; text-align:right; font-variant-numeric:tabular-nums;
    text-shadow:0 1px 3px rgba(0,0,0,0.85); }
</style>
</head>
<body>
  <div id="mmfade"></div>
  <div id="rmecompass">
    <div class="rc-pill"><span class="rc-dir" id="rcdir">N</span><span class="rc-deg" id="rcdeg">0°</span></div>
    <div class="rc-street" id="rcstreet"></div>
  </div>

  <div id="speedo">
    <div class="panel">
      <div class="gauge">
        <svg class="dial" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="spdGrad" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#5ad1ff"/>
              <stop offset="50%" stop-color="#62e6c8"/>
              <stop offset="100%" stop-color="#7cf2a8"/>
            </linearGradient>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2.4" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- Outer RPM ring -->
          <circle class="rpmtrack" cx="100" cy="100" r="92" transform="rotate(135 100 100)" stroke-dasharray="433.54 578.05"></circle>
          <circle class="rpmfill" id="rpm" cx="100" cy="100" r="92" transform="rotate(135 100 100)" stroke-dasharray="0 578.05"></circle>

          <!-- Main speed dial -->
          <circle class="track" cx="100" cy="100" r="80" transform="rotate(135 100 100)" stroke-dasharray="376.99 502.65"></circle>
          <g id="ticks"></g>
          <circle class="prog" id="prog" cx="100" cy="100" r="80" transform="rotate(135 100 100)" stroke-dasharray="0 502.65" filter="url(#glow)"></circle>
        </svg>

        <div class="center">
          <div class="val" id="spd">0</div>
          <div class="unit" id="unit">KM/H</div>
          <div class="gear" id="gear">N</div>
          <div class="airRow" id="airRow">
            <span class="albl">ALT</span><span class="aval" id="alt">0</span><span class="aunit">m</span>
          </div>
        </div>
      </div>

      <div class="meters">
        <div class="meter">
          <svg class="mi" id="fuelIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="15" y1="22" y2="22"></line><line x1="4" x2="14" y1="9" y2="9"></line><path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"></path><path d="M14 13h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2a2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"></path></svg>
          <div class="bar"><span id="fuelBar"></span></div>
          <div class="pct" id="fuelPct">--%</div>
        </div>
        <div class="meter">
          <svg class="mi" id="dmgIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
          <div class="bar"><span id="dmgBar"></span></div>
          <div class="pct" id="dmgPct">--%</div>
        </div>
      </div>
    </div>
  </div>

<script>
(function(){
  var SPEED_C = 502.65, SPEED_ARC = 376.99;   // main dial (270deg, r=80)
  var RPM_C = 578.05, RPM_ARC = 433.54;        // rpm ring (270deg, r=92)
  function el(id){ return document.getElementById(id); }
  function clamp(lo, hi, v){ return Math.max(lo, Math.min(hi, v)); }

  // Build refined tick marks along the 270deg speed arc
  (function(){
    var g = el('ticks'); if(!g) return;
    var cx = 100, cy = 100, N = 30, svgns = 'http://www.w3.org/2000/svg';
    for (var i = 0; i <= N; i++) {
      var major = (i % 5 === 0);
      var rad = (135 + (i / N) * 270) * Math.PI / 180;
      var r2 = 76, r1 = major ? 66 : 70;
      var ln = document.createElementNS(svgns, 'line');
      ln.setAttribute('x1', (cx + r1 * Math.cos(rad)).toFixed(2));
      ln.setAttribute('y1', (cy + r1 * Math.sin(rad)).toFixed(2));
      ln.setAttribute('x2', (cx + r2 * Math.cos(rad)).toFixed(2));
      ln.setAttribute('y2', (cy + r2 * Math.sin(rad)).toFixed(2));
      ln.setAttribute('class', major ? 'tick tick-major' : 'tick');
      g.appendChild(ln);
    }
  })();

  function showSpeedo(s){ el('speedo').classList[s ? 'add' : 'remove']('visible'); }

  window.addEventListener('message', function(e){
    var d = e.data || {};
    if (d.action === 'pause') {
      document.body.classList[d.hidden ? 'add' : 'remove']('paused');
      return;
    }
    if (d.action === 'compass') {
      el('rmecompass').classList.add('visible');
      if (d.dir !== undefined) { el('rcdir').textContent = d.dir; }
      if (d.heading !== undefined) { el('rcdeg').textContent = d.heading + '\u00b0'; }
      if (d.street !== undefined) { el('rcstreet').textContent = d.street || ''; }
      return;
    }
    if (d.action === 'speedo') { showSpeedo(d.show); return; }
    if (d.action === 'update') {
      showSpeedo(true);
      el('spd').textContent = d.speed;
      el('unit').textContent = d.unit;

      // Speed arc (calibrated 240 ground / 260 air so the fill tracks real speed)
      var max = d.isAir ? 260 : 240;
      var frac = clamp(0, 1, (d.speed || 0) / max);
      el('prog').setAttribute('stroke-dasharray', (frac * SPEED_ARC).toFixed(1) + ' ' + SPEED_C);
      var pc = el('prog');
      if (frac >= 0.86) { pc.style.stroke = '#ff5d6c'; }
      else if (frac >= 0.62) { pc.style.stroke = '#ffcc57'; }
      else { pc.style.stroke = 'url(#spdGrad)'; }

      // Outer RPM ring (GetVehicleCurrentRpm is 0..1)
      var rpm = clamp(0, 1, d.rpm || 0);
      el('rpm').setAttribute('stroke-dasharray', (rpm * RPM_ARC).toFixed(1) + ' ' + RPM_C);
      el('rpm').style.stroke = (rpm >= 0.85) ? '#ff5d6c' : 'rgba(120,225,255,0.55)';

      // Fuel meter
      var fuel = clamp(0, 100, d.fuel || 0);
      el('fuelBar').style.width = fuel + '%';
      el('fuelPct').textContent = fuel + '%';
      var fcol = fuel <= 20 ? '#ff5d6c' : (fuel <= 40 ? '#ffcc57' : '#54e0a0');
      el('fuelBar').style.background = fcol;
      el('fuelBar').style.boxShadow = '0 0 8px ' + fcol + '66';
      el('fuelIcon').style.color = (fuel <= 20) ? '#ff7a86' : 'rgba(255,255,255,0.92)';

      // Vehicle condition meter
      var hp = clamp(0, 100, (d.health === undefined ? 100 : d.health));
      el('dmgBar').style.width = hp + '%';
      el('dmgPct').textContent = hp + '%';
      var dcol = hp > 60 ? '#54e0a0' : (hp > 30 ? '#ffcc57' : '#ff5d6c');
      el('dmgBar').style.background = dcol;
      el('dmgBar').style.boxShadow = '0 0 8px ' + dcol + '66';
      el('dmgIcon').style.color = (hp <= 30) ? '#ff7a86' : 'rgba(255,255,255,0.92)';

      // Gear (ground) vs altitude (air)
      if (d.isAir) {
        el('gear').style.display = 'none';
        el('airRow').style.display = 'flex';
        el('alt').textContent = d.altitude;
      } else {
        el('gear').style.display = 'flex';
        el('airRow').style.display = 'none';
        el('gear').textContent = (d.speed < 2) ? 'N' : ('' + d.gear);
      }
    }
  });
})();
</script>
</body>
</html>
