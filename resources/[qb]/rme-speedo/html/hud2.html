<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Roboto,Arial,sans-serif; }
  html,body { width:100%; height:100%; overflow:hidden; background:transparent; }

  /* === Minimap fade overlay (DISABLED) === kept for compatibility */
  :root{
    --mm-left: 1vw;
    --mm-bottom: 4.5vh;
    --mm-width: 31vh;
    --mm-height: 20vh;
    --accent: #5ad1ff;
  }
  #mmfade {
    position:absolute; left:var(--mm-left); bottom:var(--mm-bottom);
    width:var(--mm-width); height:var(--mm-height);
    pointer-events:none; border-radius:14px;
    display:none;
  }

  /* Compass centered above the minimap */
  #rmecompass {
    position:absolute; left:var(--mm-left); bottom:21vh; width:var(--mm-width);
    display:none; text-align:center; color:#ffffff;
    text-shadow:0 1px 3px rgba(0,0,0,0.9), 0 0 2px rgba(0,0,0,0.7);
  }
  #rmecompass.visible { display:block; }
  #rmecompass .rc-dir { font-size:22px; font-weight:800; letter-spacing:1px; }
  #rmecompass .rc-deg { font-size:13px; font-weight:600; color:rgba(255,255,255,0.78); margin-left:6px; }
  #rmecompass .rc-street { font-size:12px; font-weight:600; color:rgba(255,255,255,0.86); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  body.paused #mmfade,
  body.paused #rmecompass { display:none !important; }

  /* ===================== Speedometer (bottom-right) ===================== */
  #speedo {
    position:absolute; right:22px; bottom:24px; width:196px;
    color:#fff; opacity:0; transform:translateY(10px) scale(.96);
    transition:opacity .25s ease, transform .25s ease;
    pointer-events:none; -webkit-font-smoothing:antialiased;
  }
  #speedo.visible { opacity:1; transform:translateY(0) scale(1); }

  /* Glass card */
  .card {
    position:relative; padding:12px 14px 11px;
    background:linear-gradient(160deg, rgba(20,26,38,0.62), rgba(10,13,20,0.50));
    border:1px solid rgba(255,255,255,0.10);
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.07);
    backdrop-filter:blur(13px) saturate(135%);
    -webkit-backdrop-filter:blur(13px) saturate(135%);
  }

  .gauge { position:relative; width:168px; height:168px; margin:0 auto; }
  .gauge svg.dial { width:168px; height:168px; display:block; }
  .track { fill:none; stroke:rgba(255,255,255,0.13); stroke-width:11; stroke-linecap:round; }
  .ticks { fill:none; stroke:rgba(255,255,255,0.22); stroke-width:9; stroke-dasharray:1.4 16.6; }
  .prog  { fill:none; stroke:url(#spdGrad); stroke-width:11; stroke-linecap:round;
           transition:stroke-dasharray .14s linear; filter:url(#glow); }

  .center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .val {
    font-size:50px; font-weight:800; line-height:1; letter-spacing:-2px;
    font-variant-numeric:tabular-nums; font-feature-settings:'tnum' 1;
    text-shadow:0 2px 10px rgba(0,0,0,0.55);
  }
  .unit { font-size:10px; font-weight:800; color:rgba(255,255,255,0.66); letter-spacing:3px; margin-top:6px; }

  .gearbadge {
    position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
    min-width:30px; text-align:center;
    background:rgba(255,255,255,0.06); border:1px solid rgba(90,209,255,0.45);
    border-radius:9px; padding:2px 11px; font-size:13px; font-weight:800;
    color:var(--accent); letter-spacing:.5px;
    box-shadow:0 0 12px rgba(90,209,255,0.18), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .footer { margin-top:9px; padding:0 4px; }
  .fuel { display:flex; align-items:center; gap:9px; width:100%; }
  .ficon { width:15px; height:15px; flex-shrink:0; color:rgba(255,255,255,0.78); transition:color .25s; }
  .fbar {
    flex:1; height:7px; background:rgba(0,0,0,0.40);
    border:1px solid rgba(255,255,255,0.10); border-radius:8px; overflow:hidden;
    box-shadow:inset 0 1px 2px rgba(0,0,0,0.4);
  }
  .fbar > i {
    display:block; height:100%; width:100%;
    background:linear-gradient(90deg, #4ad6a4, #6fe3b6);
    border-radius:8px; transition:width .35s ease, background .3s;
  }
  .fuel.low .fbar > i { background:linear-gradient(90deg, #ff5d5d, #ff8585); animation:lowpulse 1.1s ease-in-out infinite; }
  .fuel.low .ficon { color:#ff7a7a; }
  @keyframes lowpulse { 0%,100%{opacity:1;} 50%{opacity:.55;} }

  .airinfo { margin-top:9px; text-align:center; }
  .albl { font-size:10px; color:rgba(255,255,255,0.62); font-weight:800; letter-spacing:2px; }
  .aval { font-weight:800; color:var(--accent); font-size:18px; margin-left:6px; font-variant-numeric:tabular-nums; }
  .aunit { color:rgba(255,255,255,0.62); margin-left:2px; font-size:11px; font-weight:700; }
</style>
</head>
<body>
  <div id="mmfade"></div>
  <div id="rmecompass">
    <div><span class="rc-dir" id="rcdir">N</span><span class="rc-deg" id="rcdeg">0°</span></div>
    <div class="rc-street" id="rcstreet"></div>
  </div>

  <div id="speedo">
    <div class="card">
      <div class="gauge">
        <svg class="dial" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="spdGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#5ad1ff"/>
              <stop offset="55%" stop-color="#6ce0c0"/>
              <stop offset="100%" stop-color="#7cf2a8"/>
            </linearGradient>
            <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="3.2" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <circle class="track" cx="100" cy="100" r="80" transform="rotate(135 100 100)" stroke-dasharray="376.99 502.65"></circle>
          <circle class="ticks" cx="100" cy="100" r="80" transform="rotate(135 100 100)" stroke-dasharray="1.4 16.6" pathLength="376.99" style="stroke-dashoffset:0"></circle>
          <circle class="prog" id="prog" cx="100" cy="100" r="80" transform="rotate(135 100 100)" stroke-dasharray="0 502.65"></circle>
        </svg>
        <div class="center">
          <div class="val" id="spd">0</div>
          <div class="unit" id="unit">KM/H</div>
        </div>
        <div class="gearbadge" id="gear">N</div>
      </div>
      <div class="footer" id="footer">
        <span class="fuel" id="fuelWrap">
          <svg class="ficon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="15" y1="22" y2="22"></line><line x1="4" x2="14" y1="9" y2="9"></line><path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"></path><path d="M14 13h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2a2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"></path></svg>
          <span class="fbar"><i id="fuelFill"></i></span>
        </span>
      </div>
      <div class="airinfo" id="airRow" style="display:none;">
        <span class="albl">ALTITUDE</span><span class="aval" id="alt">0</span><span class="aunit">m</span>
      </div>
    </div>
  </div>

<script>
  var ARC = 376.99, FULL = 502.65;
  function el(id){ return document.getElementById(id); }
  function showSpeedo(s){
    var sp = el('speedo');
    if (s) { sp.classList.add('visible'); }
    else { sp.classList.remove('visible'); }
  }
  window.addEventListener('message', function(e){
    var d = e.data || {};
    if (d.action === 'pause') {
      if (d.hidden) { document.body.classList.add('paused'); }
      else { document.body.classList.remove('paused'); }
      return;
    }
    if (d.action === 'compass') {
      var c = el('rmecompass');
      c.classList.add('visible');
      if (d.dir !== undefined) { el('rcdir').textContent = d.dir; }
      if (d.heading !== undefined) { el('rcdeg').textContent = d.heading + '\u00b0'; }
      if (d.street !== undefined) { el('rcstreet').textContent = d.street || ''; }
      return;
    }
    if (d.action === 'speedo') { showSpeedo(d.show); return; }
    if (d.action === 'update') {
      showSpeedo(true);
      el('spd').textContent = d.speed;
      el('unit').textContent = d.unit;
      var max = d.isAir ? 260 : 180;
      var frac = Math.max(0, Math.min(1, (d.speed || 0) / max));
      var len = (frac * ARC).toFixed(1);
      var prog = el('prog');
      prog.setAttribute('stroke-dasharray', len + ' ' + FULL);
      // High-speed tint: keep the cool gradient low/mid, warm up near the top.
      if (frac >= 0.86) { prog.style.stroke = '#ff6b6b'; }
      else if (frac >= 0.62) { prog.style.stroke = '#f5c451'; }
      else { prog.style.stroke = 'url(#spdGrad)'; }
      if (d.isAir) {
        el('gear').style.display = 'none';
        el('footer').style.display = 'none';
        el('airRow').style.display = 'block';
        el('alt').textContent = d.altitude;
      } else {
        el('gear').style.display = 'block';
        el('footer').style.display = 'block';
        el('airRow').style.display = 'none';
        el('gear').textContent = (d.speed < 2) ? 'N' : ('' + d.gear);
        var fuel = Math.max(0, Math.min(100, d.fuel || 0));
        el('fuelFill').style.width = fuel + '%';
        var fw = el('fuelWrap');
        if (fuel <= 20) { fw.classList.add('low'); } else { fw.classList.remove('low'); }
      }
    }
  });
</script>
</body>
</html>
