<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Roboto,Arial,sans-serif; }
  html,body { width:100%; height:100%; overflow:hidden; background:transparent; }

  .card {
    display:flex; align-items:center; gap:12px;
    min-width:260px; max-width:460px;
    background:rgba(18,18,22,0.58);
    border:1px solid rgba(255,255,255,0.16);
    border-radius:14px;
    padding:12px 18px 12px 12px;
    color:#f4f5f7;
    box-shadow:0 8px 24px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.10);
    -webkit-font-smoothing:antialiased;
  }
  .icon {
    flex:0 0 auto; width:38px; height:38px; border-radius:11px;
    display:flex; align-items:center; justify-content:center;
    background:rgba(99,179,255,0.16); border:1px solid rgba(99,179,255,0.35);
  }
  .icon svg { width:20px; height:20px; fill:none; stroke:#63b3ff; }
  .txt { display:flex; flex-direction:column; line-height:1.22; }
  .brand { font-size:10px; letter-spacing:2.5px; text-transform:uppercase; font-weight:700; color:rgba(255,255,255,0.5); margin-bottom:2px; }
  .msg { font-size:14px; font-weight:600; color:#f4f5f7; }
  .sub { font-size:11px; font-weight:500; color:rgba(255,255,255,0.5); margin-top:3px; }

  #zone {
    position:absolute; top:2%; left:50%;
    transform:translateX(-50%) translateY(-16px);
    opacity:0; transition:opacity .3s ease, transform .3s ease; pointer-events:none;
  }
  #zone.show { opacity:1; transform:translateX(-50%) translateY(0); }

  #wrap { position:absolute; top:calc(2% + 78px); left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; }
  .toast { opacity:0; transform:translateY(-12px) scale(.98); transition:opacity .28s ease, transform .28s ease; }
  .toast.show { opacity:1; transform:translateY(0) scale(1); }
  .toast.hide { opacity:0; transform:translateY(-12px) scale(.98); }

  .success .icon { background:rgba(99,230,160,0.16); border-color:rgba(99,230,160,0.40); }
  .success .icon svg { stroke:#63e6a0; }
  .error .icon { background:rgba(255,143,143,0.16); border-color:rgba(255,143,143,0.40); }
  .error .icon svg { stroke:#ff8f8f; }
  .warning .icon { background:rgba(255,209,102,0.16); border-color:rgba(255,209,102,0.40); }
  .warning .icon svg { stroke:#ffd166; }
</style>
</head>
<body>
  <div id="zone" class="card">
    <div class="icon" id="zoneIcon"></div>
    <div class="txt">
      <span class="brand">Safe Zone</span>
      <span class="msg" id="zoneName">Protected area</span>
      <span class="sub">No weapons · No combat</span>
    </div>
  </div>
  <div id="wrap"></div>
<script>
  var shield = '<svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3z"/><path d="M9 12l2 2 4-4"/></svg>';
  var zone = document.getElementById('zone');
  var zoneName = document.getElementById('zoneName');
  var zoneIcon = document.getElementById('zoneIcon');
  var wrap = document.getElementById('wrap');
  zoneIcon.innerHTML = shield;

  function extractName(message){
    if(!message) return 'Protected area';
    var m = String(message).match(/\(([^)]+)\)\s*$/);
    return m ? m[1] : message;
  }
  function showZone(message, type){
    zone.className = 'card ' + (type || 'info') + ' show';
    zoneName.textContent = extractName(message);
  }
  function hideZone(){ zone.classList.remove('show'); }
  function toast(message, type){
    if(!message) return;
    var el = document.createElement('div');
    el.className = 'card toast ' + (type || 'info');
    el.innerHTML = '<div class="icon">'+shield+'</div><div class="txt"><span class="brand">Safe Zone</span><span class="msg"></span></div>';
    el.querySelector('.msg').textContent = message;
    wrap.appendChild(el);
    requestAnimationFrame(function(){ requestAnimationFrame(function(){ el.classList.add('show'); }); });
    setTimeout(function(){
      el.classList.remove('show'); el.classList.add('hide');
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 350);
    }, 3500);
  }
  window.addEventListener('message', function(e){
    var d = e.data || {};
    if(d.action === 'show') showZone(d.message, d.type);
    else if(d.action === 'hide') hideZone();
    else if(d.action === 'notify') toast(d.message, d.type);
  });
</script>
</body>
</html>
