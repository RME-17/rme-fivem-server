<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Roboto,Arial,sans-serif; }
  html,body { width:100%; height:100%; overflow:hidden; background:transparent; }
  #hud {
    position:absolute; top:10px; right:10px; width:178px;
    background:rgba(18,18,22,0.42);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:13px;
    padding:9px 11px; color:#f4f5f7;
    box-shadow:0 6px 18px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.08);
    display:none; user-select:none; -webkit-font-smoothing:antialiased;
    opacity:0.85;
  }
  #hud.visible { display:block; }
  .hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
  .brand { font-size:9px; letter-spacing:2px; color:rgba(255,255,255,0.45); text-transform:uppercase; font-weight:700; }
  .sid { font-size:12px; font-weight:700; color:#63b3ff; background:rgba(99,179,255,0.16); border:1px solid rgba(99,179,255,0.40); padding:2px 9px; border-radius:20px; }
  .row { display:flex; justify-content:space-between; align-items:center; padding:2.5px 0; font-size:11px; line-height:1.15; }
  .label { color:rgba(255,255,255,0.55); display:flex; align-items:center; gap:6px; font-weight:500; }
  .value { font-weight:600; color:#f4f5f7; text-align:right; }
  .cid { font-size:10px; color:rgba(255,255,255,0.82); font-weight:600; letter-spacing:0.3px; }
  .sep { height:1px; background:rgba(255,255,255,0.09); margin:5px 0; }
  #cash { color:#63e6a0; font-size:15px; font-weight:800; letter-spacing:0.2px; }
  #bank { color:#f4f5f7; font-size:15px; font-weight:800; letter-spacing:0.2px; }
  .duty-on { color:#63e6a0 !important; }
  .duty-off { color:#ff8f8f !important; }
</style>
</head>
<body>
  <div id="hud">
    <div class="hdr">
      <span class="brand">RETRON</span>
      <span class="sid">ID <span id="serverId">--</span></span>
    </div>
    <div class="row"><span class="label">Citizen ID</span><span class="cid" id="citizenId">--</span></div>
    <div class="sep"></div>
    <div class="row"><span class="label">💵 Cash</span><span class="value" id="cash">$0</span></div>
    <div class="row"><span class="label">🏦 Bank</span><span class="value" id="bank">$0</span></div>
    <div class="sep"></div>
    <div class="row"><span class="label">💼 Job</span><span class="value" id="job">Civilian</span></div>
    <div class="row"><span class="label">🩺 Status</span><span class="value" id="duty">Freelancer</span></div>
    <div class="row"><span class="label">👥 Gang</span><span class="value" id="gang">No Gang</span></div>
  </div>
<script>
  var fmt = function(n){ return '$' + (Number(n)||0).toLocaleString('en-US'); };
  window.addEventListener('message', function(e){
    var d = e.data || {};
    var hud = document.getElementById('hud');
    if (d.action === 'show') { hud.classList.add('visible'); return; }
    if (d.action === 'hide') { hud.classList.remove('visible'); return; }
    if (d.action === 'update') {
      hud.classList.add('visible');
      document.getElementById('serverId').textContent = d.serverId;
      document.getElementById('citizenId').textContent = d.citizenId;
      document.getElementById('cash').textContent = fmt(d.cash);
      document.getElementById('bank').textContent = fmt(d.bank);
      var jobText = d.job; if (d.jobGrade) { jobText += ' (' + d.jobGrade + ')'; }
      document.getElementById('job').textContent = jobText;
      var duty = document.getElementById('duty');
      if (d.job === 'Civilian') { duty.textContent = 'Freelancer'; duty.className = 'value'; }
      else { duty.textContent = d.onDuty ? 'On Duty' : 'Off Duty'; duty.className = 'value ' + (d.onDuty ? 'duty-on' : 'duty-off'); }
      document.getElementById('gang').textContent = d.gang;
    }
  });
</script>
</body>
</html>
